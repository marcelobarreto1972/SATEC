services:

  # ── 1. Certbot — obtains & renews Let's Encrypt cert via DuckDNS DNS-01 ────
  certbot:
    image: ghcr.io/marcelobarreto1972/mqtt-certbot:latest
    build:
      context: ./certbot
    container_name: certbot
    restart: unless-stopped
    environment:
      DUCKDNS_TOKEN: ${DUCKDNS_TOKEN}
      DOMAIN: ${DOMAIN:-satec5.duckdns.org}
      EMAIL: ${CERTBOT_EMAIL}
      # How often the renewal loop checks (seconds). LE certs expire in 90 days;
      # certbot only renews when < 30 days remain, so checking daily is fine.
      RENEW_INTERVAL: ${RENEW_INTERVAL:-86400}
    volumes:
      - letsencrypt:/etc/letsencrypt          # certs live here
      - certbot_logs:/var/log/letsencrypt
      # Docker socket lets the entrypoint send SIGHUP to Mosquitto after renewal
      - /var/run/docker.sock:/var/run/docker.sock:ro
    healthcheck:
      test: ["CMD", "test", "-f",
             "/etc/letsencrypt/live/${DOMAIN:-satec5.duckdns.org}/fullchain.pem"]
      interval: 10s
      timeout: 5s
      retries: 30        # wait up to ~5 min for first issuance
      start_period: 10s

  # ── 2. Mosquitto — TLS via Let's Encrypt cert ────────────────────────────────
  mosquitto:
    image: eclipse-mosquitto:2.0
    container_name: mosquitto
    restart: unless-stopped
    depends_on:
      certbot:
        condition: service_healthy
    ports:
      - "8883:8883"
    volumes:
      - ./mosquitto/config/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - letsencrypt:/etc/letsencrypt:ro
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 8883 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s

  # ── 3. Subscriber — MQTT → NeonDB ────────────────────────────────────────────
  subscriber:
    image: ghcr.io/marcelobarreto1972/mqtt-subscriber:latest
    build:
      context: ./subscriber
    container_name: mqtt-subscriber
    restart: unless-stopped
    depends_on:
      mosquitto:
        condition: service_healthy
    environment:
      MQTT_HOST: ${DOMAIN:-satec5.duckdns.org}  # use public domain for TLS hostname verification
      MQTT_PORT: "8883"
      MQTT_TOPIC: sensors/dht22
      MQTT_CLIENT_ID: subscriber-01
      # LE chain — trusted by the system CA bundle, but we pin ours for clarity
      MQTT_CA_CERT: /etc/letsencrypt/live/${DOMAIN:-satec5.duckdns.org}/chain.pem
      MQTT_CLIENT_CERT: ""
      MQTT_CLIENT_KEY: ""
      NEON_DSN: ${NEON_DSN}
    volumes:
      - letsencrypt:/etc/letsencrypt:ro

volumes:
  letsencrypt:
  certbot_logs:
  mosquitto_data:
  mosquitto_log: