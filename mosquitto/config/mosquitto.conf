# ── Listeners ─────────────────────────────────────────────────────────────────
listener 8883
protocol mqtt

# ── TLS — Let's Encrypt cert (managed by certbot container) ──────────────────
# The DOMAIN variable is expanded by the entrypoint before Mosquitto starts.
# We use a wrapper script (see docker-compose command:) to substitute it,
# or you can hard-code satec.duckdns.org here directly.
cafile   /etc/letsencrypt/live/satec.duckdns.org/chain.pem
certfile /etc/letsencrypt/live/satec.duckdns.org/fullchain.pem
keyfile  /etc/letsencrypt/live/satec.duckdns.org/privkey.pem

tls_version tlsv1.2

# ── Auth ──────────────────────────────────────────────────────────────────────
# Server-only TLS (no mTLS) — clients validate the LE cert, no client cert needed.
# Add password_file here if you want username/password auth on top of TLS.
allow_anonymous true

# ── Persistence ───────────────────────────────────────────────────────────────
persistence true
persistence_location /mosquitto/data/

# ── Logging ───────────────────────────────────────────────────────────────────
log_dest file /mosquitto/log/mosquitto.log
log_dest stdout
log_type error
log_type warning
log_type notice
log_type information